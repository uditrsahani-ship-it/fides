<!DOCTYPE html>
<html>
<head>
  <title>Fidelity American Trust</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    html,body,h1,h2,h3,h4,h5 {font-family: "Raleway", sans-serif}
    .chat-container {
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    #login-form input[type="text"],
    #login-form input[type="password"] {
      width: 80%;
      padding: 8px;
      margin: 6px 0;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    #login-form input[type="submit"] {
      background-color: #000;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #login-form input[type="submit"]:hover {
      background-color: #333;
    }
    #login-status {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-bar w3-striped w3-black w3-small" style="z-index: 8;">
    <span class="w3-bar-item w3-animate-left">
      <a href="index.html">
        <img src="fatlogo.png" style="height: 82px; margin-top: 0px;">
      </a>
    </span>
    <h1 style="display: flex; justify-content: center;">Fidelity America Trust</h1>
  </div>

  <main>
    <div class="w3-card w3-padding-8 w3-center w3-animate-opacity" style="width: 50%; margin: 0 auto;">
      <h2>Login</h2>
      <form id="login-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required><br><br>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required><br><br>
        <input type="submit" value="Login">
      </form>
      <div id="login-status"></div>
    </div>
  </main>

  <script>
  const form = document.getElementById('login-form');

  // Simulated users (later this comes from DB)
  const users = [
    {
      id: '5d3bbf99-9e51-4972-b297-409adf2cbd51',
      email: 'tom@fidelity.com',
      password: 'HardTomm13!',
      first_name: 'Tom',
      last_name: 'Hardy',
      profile_pic: 'tomhardy.jpeg'
    },
    {
      id: '2dee1548-f969-47ae-92d7-4a88bc91cc02',
      email: 'john@fidelity.com',
      password: 'JohnPass123!',
      first_name: 'John',
      last_name: 'Doe',
      profile_pic: 'default.jpg'
    }
  ];

  form.addEventListener('submit', (e) => {
    e.preventDefault();

    const email = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    const user = users.find(u => u.email === email && u.password === password);

    if (user) {
      // Save logged-in user
      localStorage.setItem('user', JSON.stringify(user));

      window.location.href = 'domsitee.html';
    } else {
      document.getElementById('login-status').innerHTML =
        'Invalid login details. Please try again.';
    }
  });
</script>
</body>
</html>
