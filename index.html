<!DOCTYPE html>
<html>
<head>
  <title>Fidelity American Trust</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    html,body,h1,h2,h3,h4,h5 {font-family: "Raleway", sans-serif}
    #loginForm input {width: 80%; padding: 8px; margin: 6px 0; border-radius: 4px; border: 1px solid #ccc;}
    #loginForm button {background-color: #000; color: #fff; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 80%;}
    #login-status {color: red; margin-top: 10px; font-weight: bold;}
  </style>
</head>
<body class="w3-light-grey">

  <!-- Restored Logo Section -->
  <div class="w3-bar w3-striped w3-black w3-small" style="z-index: 8; display: flex; align-items: center;">
    <span class="w3-bar-item w3-animate-left">
      <a href="index.html"><img src="fatlogo.png" style="height: 82px; margin-top: 0px;"></a>
    </span>
    <h1 style="flex-grow: 1; text-align: center; margin-right: 120px;">Fidelity America Trust</h1>
  </div>

  <main>
    <div class="w3-card w3-padding-16 w3-center w3-animate-opacity" style="width: 50%; margin: 50px auto; background: white;">
      <h2>Login</h2>
      <form id="loginForm">
        <input type="email" id="email" required placeholder="Email"><br>
        <input type="password" id="password" required placeholder="Password"><br>
        <button type="submit">Login</button>
      </form>
      <div id="login-status"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient(
      'https://ivzrnkdyymngghidqkyd.supabase.co', 
      'sb_publishable__Lh8NcOsPD8nB-tUFQ8TWg_twyCtW0V'
    );

    const form = document.getElementById('loginForm');
    const statusDiv = document.getElementById('login-status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault(); 
      statusDiv.innerText = "Authenticating...";

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error || !data.user) {
          statusDiv.innerText = 'Invalid email or password.';
          return;
        }

        const user = data.user;

        // Check for existing account
        let { data: account, error: accountError } = await supabaseClient
          .from('accounts')
          .select('*')
          .eq('user_id', user.id)
          .maybeSingle();

        if (accountError || !account) {
          const { data: newAccount, error: createError } = await supabaseClient
            .from('accounts')
            .insert([{
              user_id: user.id,
              balance: 0,
              currency: 'USD'
            }])
            .select()
            .single();

          if (createError) throw createError;
          account = newAccount;
        }

        // Local Storage Sync
        localStorage.setItem('user_id', user.id);
        localStorage.setItem('balance', account.balance || 0);

        // Redirect
        window.location.href = 'domsitee.html';
        
      } catch (err) {
        console.error(err);
        statusDiv.innerText = 'Server error. Please try again later.';
      }
    });
  </script>
</body>
</html>
