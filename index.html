<!DOCTYPE html>
<html>
<head>
  <title>Fidelity American Trust</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    html,body,h1,h2,h3,h4,h5 {font-family: "Raleway", sans-serif}
    .chat-container {max-width: 500px;margin: 40px auto;padding: 20px;background-color: #fff;border: 1px solid #ddd;border-radius: 10px;box-shadow: 0 0 10px rgba(0,0,0,0.1);}
    #login-form input[type="text"],
    #login-form input[type="password"] {width: 80%;padding: 8px;margin: 6px 0;border-radius: 4px;border: 1px solid #ccc;}
    #login-form input[type="submit"] {background-color: #000;color: #fff;padding: 10px 20px;border: none;border-radius: 4px;cursor: pointer;}
    #login-form input[type="submit"]:hover {background-color: #333;}
    #login-status {color: red;margin-top: 10px;}
  </style>
</head>
<body class="w3-light-grey">
  <div class="w3-bar w3-striped w3-black w3-small" style="z-index: 8;">
    <span class="w3-bar-item w3-animate-left">
      <a href="index.html"><img src="fatlogo.png" style="height: 82px; margin-top: 0px;"></a>
    </span>
    <h1 style="display: flex; justify-content: center;">Fidelity America Trust</h1>
  </div>

  <main>
    <div class="w3-card w3-padding-8 w3-center w3-animate-opacity" style="width: 50%; margin: 0 auto;">
      <h2>Login</h2>
      <form id="loginForm">
  <input type="email" id="email" required placeholder="Email">
  <input type="password" id="password" required placeholder="Password">
  <button type="submit">Login</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = supabase.createClient(
  'https://ivzrnkdyymngghidqkyd.supabase.co',
  'sb_publishable__Lh8NcOsPD8nB-tUFQ8TWg_twyCtW0V'
);

const form = document.getElementById('login-form');

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  try {
    // Supabase Auth login
    const { data: { session, user }, error } = await supabase.auth.signInWithPassword({
      email, password
    });

    if (error) {
      document.getElementById('login-status').innerText = 'Invalid login details. Please try again.';
      return;
    }

    // Get account info
    const { data: account } = await supabase
      .from('accounts')
      .select('*')
      .eq('user_id', user.id)
      .single();

    // Save session and user locally
    localStorage.setItem('session_token', session.access_token);
    localStorage.setItem('user', JSON.stringify(user));
    localStorage.setItem('user_id', user.id);
    localStorage.setItem('balance', account?.balance || 0);

    // Optional: log login attempt
    await supabase.from('login_attempts').insert([{
      user_id: user.id,
      attempt_time: new Date().toISOString(),
      succesful: true,
      ip_address: '' // optionally capture real IP
    }]);

    window.location.href = 'domsitee.html';
  } catch (err) {
    console.error(err);
    document.getElementById('login-status').innerText = 'Server error. Try again later.';
  }
});
</script>
</body>
</html>
