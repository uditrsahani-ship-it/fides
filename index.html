<!DOCTYPE html>
<html lang="en">
<head>
  <title>Fidelity American Trust | Secure Login</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
  <style>
    html,body,h1,h2,h3,h4,h5 {font-family: "Raleway", sans-serif}
    .login-box { max-width: 450px; margin: 50px auto; background: white; border-radius: 8px; }
    #loginForm input { width: 85%; padding: 12px; margin: 8px 0; border-radius: 4px; border: 1px solid #ccc; font-size: 16px; }
    #loginForm button { background-color: #000; color: #fff; padding: 12px; border: none; border-radius: 4px; cursor: pointer; width: 85%; font-weight: bold; font-size: 16px; }
    #login-status { color: #d32f2f; margin-top: 15px; font-weight: bold; }
    .w3-bar { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 100px; }
  </style>
</head>
<body class="w3-light-grey">

  <!-- Header with Logo -->
  <div class="w3-bar w3-black w3-card">
    <a href="index.html" class="w3-bar-item">
      <img src="fatlogo.png" alt="Logo" style="height: 80px;">
    </a>
    <h2 class="w3-center" style="flex-grow: 1; margin: 0; font-weight: bold;">Fidelity America Trust</h2>
    <div style="width: 100px;"></div> 
  </div>

  <main class="w3-container">
    <div class="w3-card-4 login-box w3-center w3-padding-32 w3-animate-opacity">
      <h2 style="font-weight: bold;">Secure Login</h2>
      <p class="w3-text-grey">Prototype Access Mode</p>
      
      <form id="loginForm">
        <input type="email" id="email" required placeholder="Email Address">
        <input type="password" id="password" required placeholder="Password">
        <div id="login-status"></div>
        <button type="submit" id="submitBtn">LOG IN</button>
      </form>
    </div>
  </main>

  <script>
    const loginForm = document.getElementById('loginForm');
    const statusDiv = document.getElementById('login-status');
    const submitBtn = document.getElementById('submitBtn');

    // HARDCODED CREDENTIALS FOR PROTOTYPE
    const PROTOTYPE_USER = "mcmcquitty@yahoo.com";
    const PROTOTYPE_PASS = "ChaseMatt14!";

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const emailInput = document.getElementById('email').value.trim();
      const passInput = document.getElementById('password').value;

      statusDiv.innerText = "Authenticating with Vault...";
      submitBtn.disabled = true;

      // Artificial delay to make it look like it's checking a server
      setTimeout(() => {
        if (emailInput === PROTOTYPE_USER && passInput === PROTOTYPE_PASS) {
          statusDiv.style.color = "green";
          statusDiv.innerText = "Access Granted. Redirecting...";
          
          // Set mock session data so the dashboard doesn't crash
          localStorage.setItem('user_email', emailInput);
          localStorage.setItem('user_id', 'proto_user_12345');
          localStorage.setItem('is_prototype', 'true');

          // Redirect to dashboard
          window.location.href = 'domsitee.html';
        } else {
          statusDiv.style.color = "red";
          statusDiv.innerText = "Invalid credentials. Please check your email or password.";
          submitBtn.disabled = false;
        }
      }, 1500); 
    });
  </script>
</body>
</html>
