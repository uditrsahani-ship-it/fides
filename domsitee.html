<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIDELITY AMERICA TRUST</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    html, body, h1, h2, h3, h4, h5 { font-family: "Raleway", sans-serif; }
    body { background-color: #f1f1f1; margin: 0; }
    
    /* Desktop Sidebar */
    .w3-sidebar { width: 300px; z-index: 3; font-weight: bold; }
    
    /* Top Bar Logic */
    .top-bar { 
      padding: 0 16px; 
      height: 75px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      background-color: #000; 
      color: #fff; 
      position: sticky; 
      top: 0; 
      z-index: 4; 
      margin-left: 300px; 
      transition: margin-left 0.3s;
    }
    
    .top-bar img { height: 45px; }
    .top-bar h1 { font-size: 18px; flex: 1; text-align: center; margin: 0; font-weight: bold; }
    
    /* Main Content & Layout */
    .main-content { margin-left: 300px; padding: 24px; transition: margin-left 0.3s; }
    .footer { text-align: center; padding: 16px; background: #e0e0e0; margin-left: 300px; transition: margin-left 0.3s; }

    .profile-section { width: 60px; height: 60px; object-fit: cover; border-radius: 50%; border: 2px solid #4CAF50; margin-top: 5px; }
    .balance-card { transition: transform 0.3s ease; }
    .balance-card:hover { transform: scale(1.02); }

    /* MOBILE OVERRIDES (Screens smaller than 992px) */
    @media (max-width: 992px) {
      .top-bar, .main-content, .footer { margin-left: 0 !important; }
      .top-bar h1 { font-size: 14px; }
      .hide-mobile { display: none; }
      .w3-sidebar { display: none; } /* Hidden by default on mobile */
    }
  </style>
</head>
<body class="w3-light-grey">

  <!-- Sidebar Overlay for Mobile -->
  <div class="w3-overlay w3-hide-large w3-animate-opacity" onclick="w3_close()" style="cursor:pointer" id="myOverlay"></div>

  <!-- Top Bar -->
  <div class="top-bar">
    <button class="w3-button w3-black w3-hide-large w3-left" onclick="w3_open()"><i class="fa fa-bars"></i></button>
    <a href="domsitee.html"><img src="fatlogo.png" alt="Logo"></a>
    <h1>FIDELITY AMERICA TRUST</h1>
    <button class="w3-button w3-small w3-black w3-round" onclick="logout()">
      <i class="fa fa-sign-out"></i> <span class="hide-mobile">Logout</span>
    </button>
  </div>

  <!-- Sidebar -->
  <nav class="w3-sidebar w3-white w3-collapse w3-animate-left" id="mySidebar">
    <div class="w3-container w3-padding-16">
      <div class="w3-row">
        <div class="w3-col s4">
          <img src="chase.jpeg.jpeg" class="profile-section" id="profile-pic">
        </div>
        <div class="w3-col s8 w3-padding-small">
          <span>Welcome,<br><strong id="profile-name">User</strong></span>
        </div>
      </div>
    </div>
    <div id="date-time" class="w3-container w3-small w3-text-grey w3-padding"></div>
    <hr>
    <div class="w3-container"><h5>Services</h5></div>
    <div class="w3-bar-block">
      <a href="#" class="w3-bar-item w3-button w3-padding w3-green"><i class="fa fa-users fa-fw"></i> Overview</a>
      <a href="send.html" class="w3-bar-item w3-button w3-padding"><i class="fa fa-money fa-fw"></i> Send Money</a>
      <a href="#" class="w3-bar-item w3-button w3-padding"><i class="fa fa-laptop fa-fw"></i> Pay Bills</a>
      <a href="#" class="w3-bar-item w3-button w3-padding"><i class="fa fa-credit-card fa-fw"></i> Request Card</a>
      <a href="mailto:fidelityamericatrust@gmail.com" class="w3-bar-item w3-button w3-padding"><i class="fa fa-balance-scale fa-fw"></i> Dispute Resolution</a>
      <a href="#" class="w3-bar-item w3-button w3-padding"><i class="fa fa-history fa-fw"></i> History</a>
      <a href="#" class="w3-bar-item w3-button w3-padding"><i class="fa fa-user fa-fw"></i> Profile</a>
      <a href="javascript:void(0)" onclick="w3_close()" class="w3-bar-item w3-button w3-padding w3-hide-large w3-text-red"><i class="fa fa-remove fa-fw"></i> Close Menu</a>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <header class="w3-container">
      <h5><b><i class="fa fa-dashboard"></i> My Dashboard</b></h5>
    </header>

    <!-- Professional Balance Card -->
    <div class="w3-container w3-margin-bottom">
      <div class="w3-container w3-green w3-padding-32 balance-card" style="position: relative; border-radius: 12px;">
        <div class="w3-left"><i class="fa fa-university w3-xxxlarge"></i></div>
        <div class="w3-center">
          <h4 style="margin-bottom: 0; opacity: 0.9; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;">
            Available Balance 
            <i class="fa fa-eye-slash" id="toggleEye" onclick="toggleBalance()" style="cursor: pointer; margin-left: 8px;" title="Toggle Visibility"></i>
          </h4>
          <span id="balance" style="font-size: 32px; font-weight: bold; display: block;">$0.00</span>
          <span id="balance-hidden" style="font-size: 32px; font-weight: bold; display: none;">••••••••</span>
        </div>
      </div>
    </div>

    <!-- Quick Action Buttons -->
    <div class="w3-container">
      <div class="w3-row-padding" style="margin:0 -16px">
        <div class="w3-half w3-margin-bottom">
          <button class="w3-button w3-block w3-black w3-padding-large" onclick="location.href='send.html'"><i class="fa fa-money"></i> Transfers</button>
        </div>
        <div class="w3-half w3-margin-bottom">
          <button class="w3-button w3-block w3-black w3-padding-large" onclick="location.href='https://www.kayak.com/flights'"><i class="fa fa-plane"></i> Book a Flight</button>
        </div>
        <div class="w3-half w3-margin-bottom">
          <button class="w3-button w3-block w3-black w3-padding-large" onclick="location.href='https://www.booking.com/'"><i class="fa fa-hotel"></i> Hotel Reservation</button>
        </div>
        <div class="w3-half w3-margin-bottom">
          <button class="w3-button w3-block w3-black w3-padding-large" onclick="location.href='https://bitcoin.org/en/'"><i class="fa fa-bitcoin"></i> Buy Bitcoin</button>
        </div>
      </div>
    </div>
  <!-- NEW: Transaction History Section -->
    <div class="w3-container">
      <h5><b>Recent Transactions</b></h5>
      <div class="w3-card-4 w3-white" style="border-radius: 8px;">
      <ul class="w3-ul w3-card-4 w3-white" id="transaction-list" style="border-radius: 8px; overflow: hidden;">
        <!-- Transactions will be injected here by JavaScript -->
      </ul>
      </div>  
    </div>
    </div>

  <footer class="footer">
    <p>Powered by <a href="#">LiisH</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient('https://ivzrnkdyymngghidqkyd.supabase.co', 'sb_publishable__Lh8NcOsPD8nB-tUFQ8TWg_twyCtW0V');

    // Mobile Sidebar Logic
    var mySidebar = document.getElementById("mySidebar");
    var overlayBg = document.getElementById("myOverlay");

    function w3_open() {
      if (mySidebar.style.display === 'block') { w3_close(); } 
      else { mySidebar.style.display = 'block'; overlayBg.style.display = "block"; }
    }
    function w3_close() { mySidebar.style.display = "none"; overlayBg.style.display = "none"; }

    // Dashboard Data Loading
    async function loadDashboard() {
      const isPrototype = localStorage.getItem('is_prototype') === 'true';

      if (isPrototype) {
        document.getElementById('profile-name').innerText = "Chase Matthew M";
        document.getElementById('profile-pic').src = 'chase.jpeg';
        
        let balance = localStorage.getItem('balance');
        if (!balance) {
          const min = 2000200.01; const max = 2921021.12;
          balance = (Math.random() * (max - min) + min).toFixed(2);
          localStorage.setItem('balance', balance);
        }
        displayBalance(balance);
        return;
      }

      // Supabase Fetch
      const session_token = localStorage.getItem('session_token');
      if (!session_token) { window.location.href = "index.html"; return; }
      const { data: session } = await supabaseClient.from('sessions').select('*').eq('session_token', session_token).single();
      if (session) {
        const { data: user } = await supabaseClient.from('users').select('*').eq('id', session.user_id).single();
        if (user) {
          document.getElementById('profile-name').innerText = user.first_name || "User";
          document.getElementById('profile-pic').src = user.profile_pic || 'default.jpg';
        }
        const { data: account } = await supabaseClient.from('accounts').select('balance').eq('user_id', session.user_id).single();
        displayBalance(account?.balance || 0);
      }
    }

    function displayBalance(amount) {
      const balanceEl = document.getElementById('balance');
      const hiddenEl = document.getElementById('balance-hidden');
      const eyeIcon = document.getElementById('toggleEye');
      
      const formatted = '$' + parseFloat(amount).toLocaleString(undefined, { 
        minimumFractionDigits: 2, maximumFractionDigits: 2 
      });
      balanceEl.textContent = formatted;

      if (localStorage.getItem('balance_hidden') === 'true') {
        balanceEl.style.display = 'none'; hiddenEl.style.display = 'block';
        eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    function toggleBalance() {
      const b = document.getElementById('balance');
      const bh = document.getElementById('balance-hidden');
      const eye = document.getElementById('toggleEye');

      if (b.style.display === 'none') {
        b.style.display = 'block'; bh.style.display = 'none';
        eye.classList.replace('fa-eye', 'fa-eye-slash');
        localStorage.setItem('balance_hidden', 'false');
      } else {
        b.style.display = 'none'; bh.style.display = 'block';
        eye.classList.replace('fa-eye-slash', 'fa-eye');
        localStorage.setItem('balance_hidden', 'true');
      }
    }

    // Initialize
    loadDashboard();
    setInterval(() => { document.getElementById("date-time").textContent = new Date().toLocaleString(); }, 1000);

    function logout() { localStorage.clear(); window.location.href = 'index.html'; }

    // Auto-Logout Timer (5 Mins)
    let timeout;
    function resetTimer() {
      clearTimeout(timeout);
      timeout = setTimeout(() => { logout(); }, 300000);
    }
    document.onmousemove = resetTimer; document.onkeypress = resetTimer;
    function loadTransactions() {
      const list = document.getElementById('transaction-list');
      
      // 1. Static "Seed" Data (Random history)
      const seedData = [
        { desc: "Amazon.com Marketplace", date: "May 01, 2026", amt: "-$42.50", color: "w3-text-red" },
        { desc: "Starbucks Coffee", date: "May 01, 2026", amt: "-$12.00", color: "w3-text-red" },
        { desc: "Zelle Transfer - Received", date: "Apr 28, 2026", amt: "+$500.00", color: "w3-text-green" },
        { desc: "Apple Services", date: "Apr 25, 2026", amt: "-$9.99", color: "w3-text-red" }
      ];

      // 2. Get "User-Made" Transactions from LocalStorage
      const userTransactions = JSON.parse(localStorage.getItem('recent_trans')) || [];

      // Combine them: New ones first, then seed data
      const allTransactions = [...userTransactions, ...seedData];

      if (allTransactions.length === 0) {
        list.innerHTML = '<li class="w3-padding-16 w3-center">No recent activity</li>';
        return;
      }

      list.innerHTML = allTransactions.map(t => `
        <li class="w3-padding-16">
          <span class="w3-right w3-large ${t.color || 'w3-text-red'}"><b>${t.amt}</b></span>
          <span class="w3-large">${t.desc}</span><br>
          <span class="w3-text-grey w3-small">${t.date}</span>
        </li>
      `).join('');
    }

    // Call this inside your existing loadDashboard() function
    loadTransactions();
  </script>
</body>
</html>
