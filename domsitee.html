<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fidelity America Trust</title>
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Raleway">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <style>
    html, body, h1, h2, h3, h4, h5 {
      font-family: "Raleway", sans-serif;
    }

    body {
      background-color: #f1f1f1;
    }

    .w3-sidebar {
      width: 300px;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      overflow-y: auto;
      z-index: 3;
    }

    .top-bar {
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #000;
      color: #fff;
    }

    .top-bar h1 {
      font-size: 22px;
      margin: 0;
    }

    .main-content {
      margin-left: 300px;
      padding: 24px;
    }

    .balance-card {
      transition: background-color 0.5s;
    }

    .balance-card:hover {
      background-color: #000 !important;
    }

    .profile-section img {
      border-radius: 50%;
      width: 60px;
      height: 60px;
      margin-top: 10px;
      object-fit: cover;
    }

    .footer {
      text-align: center;
      padding: 16px;
      background: #e0e0e0;
    }
  </style>
</head>
<body class="w3-light-grey">

  <div class="top-bar w3-bar w3-black">
    <a href="domsitee.html" class="w3-bar-item">
      <img src="fatlogo.png" alt="Fidelity America Trust Logo" style="height: 60px;">
    </a>
    <h1 class="w3-bar-item">Fidelity America Trust</h1>
    <button class="w3-button w3-small w3-black w3-bar-item" onclick="logout()">
      <i class="fa fa-sign-out"></i> Logout
    </button>
  </div>

  <nav class="w3-sidebar w3-white w3-collapse w3-animate-left" id="mySidebar">
    <div class="w3-container w3-row w3-padding">
      <div class="w3-col s4 w3-center">
        <img src="Flores.jpg" alt="Profile Picture" class="profile-section">
      </div>
      <div class="w3-col s8">
        <span>Welcome,<br><strong>Flores, Tarik</strong></span>
      </div>
    </div>
    <div id="date-time" class="w3-container w3-small w3-text-grey w3-padding"></div>
    <hr>
    <div class="w3-container">
      <h5>Services</h5>
    </div>
    <div class="w3-bar-block">
      <a href="#" class="w3-bar-item w3-button w3-blue"><i class="fa fa-users fa-fw"></i> Overview</a>
      <a href="send.html" class="w3-bar-item w3-button"><i class="fa fa-money fa-fw"></i> Send Money</a>
      <a href="#" class="w3-bar-item w3-button"><i class="fa fa-laptop fa-fw"></i> Pay Bills</a>
      <a href="#" class="w3-bar-item w3-button"><i class="fa fa-credit-card fa-fw"></i> Request Credit Card</a>
      <a href="mailto:fidelityamericatrust@gmail.com" class="w3-bar-item w3-button"><i class="fa fa-balance-scale fa-fw"></i> Dispute Resolution</a>
      <a href="#" class="w3-bar-item w3-button"><i class="fa fa-history fa-fw"></i> History</a>
      <a href="profile.html" class="w3-bar-item w3-button"><i class="fa fa-user fa-fw"></i> Profile</a>
    </div>
  </nav>

  <div class="main-content">
    <header class="w3-container">
      <h5><b><i class="fa fa-dashboard"></i> My Dashboard</b></h5>
    </header>

    <div class="w3-container w3-margin-bottom">
      <div class="w3-container w3-green w3-padding-32 balance-card">
        <div class="w3-left"><i class="fa fa-money w3-xxxlarge"></i></div>
        <div class="w3-center">
          <h4>Available Balance</h4>
          <span id="balance" style="font-size: 36px; font-weight: bold;">Loading...</span>
        </div>
      </div>
    </div>

    <div class="w3-container">
      <button class="w3-button w3-black w3-margin-bottom" onclick="location.href='send.html'">
        <i class="fa fa-money"></i> Transfers
      </button>
      <button class="w3-button w3-black w3-margin-bottom" onclick="location.href='https://www.kayak.com/flights'">
        <i class="fa fa-plane"></i> Book a Flight
      </button>
      <button class="w3-button w3-black w3-margin-bottom" onclick="location.href='https://www.booking.com/'">
        <i class="fa fa-hotel"></i> Hotel Reservation
      </button>
      <button class="w3-button w3-black w3-margin-bottom" onclick="location.href='https://bitcoin.org/en/'">
        <i class="fa fa-bitcoin"></i> Buy Bitcoin
      </button>
    </div>
  </div>

  <footer class="footer">
    <p>Powered by <a href="https://www.w3schools.com/w3css/default.asp" target="_blank">LiisH</a></p>
  </footer>

  <script>
    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    setInterval(function () {
      const now = new Date();
      document.getElementById("date-time").textContent = now.toLocaleString();
    }, 1000);

    window.addEventListener('load', function () {
      let balance = parseFloat(localStorage.getItem('balance'));
      if (isNaN(balance)) {
        balance = parseFloat((Math.random() * (550000 - 510000) + 510000).toFixed(2));
        localStorage.setItem('balance', balance);
      }

      setTimeout(() => {
        document.getElementById('balance').textContent = '$' + balance.toLocaleString();
      }, 2500);
    });
  </script>
</body>
</html>
