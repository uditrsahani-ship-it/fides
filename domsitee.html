<body class="w3-light-grey">

    <!-- Professional Balance Card with Privacy Toggle -->
<div class="w3-container w3-margin-bottom">
  <div class="w3-container w3-green w3-padding-32 balance-card" style="position: relative; border-radius: 8px;">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Initialize Supabase (Kept for architecture, bypassed in Prototype Mode)
    const supabaseClient = supabase.createClient('https://ivzrnkdyymngghidqkyd.supabase.co', 'sb_publishable__Lh8NcOsPD8nB-tUFQ8TWg_twyCtW0V');

    async function loadDashboard() {
      // 1. Check for Prototype Flag
      const isPrototype = localStorage.getItem('is_prototype') === 'true';
      const userEmail = localStorage.getItem('user_email');

      if (isPrototype) {
        console.log("Prototype Mode Active: Chase Matthew M");
        
        // Set Prototype Identity
        document.getElementById('profile-name').innerText = "Chase Matthew M";
        document.getElementById('profile-pic').src = 'chase.jpeg';

        // 2. Handle Prototype Balance ($2,000,200.01 to $2,921,021.12)
        let balance = localStorage.getItem('balance');
        
        if (!balance) {
          const min = 2000200.01;
          const max = 2921021.12;
          balance = (Math.random() * (max - min) + min).toFixed(2);
          localStorage.setItem('balance', balance);
        }

        displayBalance(balance);
        return; // Stop here for prototype users
      }

      // --- REAL DATABASE LOGIC (Only runs if not in prototype mode) ---
      const session_token = localStorage.getItem('session_token');
      if (!session_token) { window.location.href = "index.html"; return; }

      const { data: session } = await supabaseClient.from('sessions').select('*').eq('session_token', session_token).single();
      
      if (session) {
        const { data: user } = await supabaseClient.from('users').select('*').eq('id', session.user_id).single();
        if (user) {
          document.getElementById('profile-name').innerText = user.first_name || "User";
          document.getElementById('profile-pic').src = user.profile_pic || 'default.jpg';
        }

        const { data: account } = await supabaseClient.from('accounts').select('balance').eq('user_id', session.user_id).single();
        displayBalance(account?.balance || 0);
      }
    }

    function displayBalance(amount) {
      const balanceEl = document.getElementById('balance');
      if (balanceEl) {
        balanceEl.textContent = '$' + parseFloat(amount).toLocaleString(undefined, { 
          minimumFractionDigits: 2, 
          maximumFractionDigits: 2 
        });
      }
    }
    // Function to toggle balance visibility
function toggleBalance() {
  const balanceEl = document.getElementById('balance');
  const hiddenEl = document.getElementById('balance-hidden');
  const eyeIcon = document.getElementById('toggleEye');

  if (balanceEl.style.display === 'none') {
    // Show balance
    balanceEl.style.display = 'block';
    hiddenEl.style.display = 'none';
    eyeIcon.classList.remove('fa-eye');
    eyeIcon.classList.add('fa-eye-slash');
    localStorage.setItem('balance_hidden', 'false');
  } else {
    // Hide balance
    balanceEl.style.display = 'none';
    hiddenEl.style.display = 'block';
    eyeIcon.classList.remove('fa-eye-slash');
    eyeIcon.classList.add('fa-eye');
    localStorage.setItem('balance_hidden', 'true');
  }
}

// Updated displayBalance to respect the current toggle state
function displayBalance(amount) {
  const balanceEl = document.getElementById('balance');
  const hiddenEl = document.getElementById('balance-hidden');
  const eyeIcon = document.getElementById('toggleEye');
  
  const formatted = '$' + parseFloat(amount).toLocaleString(undefined, { 
    minimumFractionDigits: 2, 
    maximumFractionDigits: 2 
  });

  balanceEl.textContent = formatted;

  // If user previously hid the balance, keep it hidden on refresh
  if (localStorage.getItem('balance_hidden') === 'true') {
    balanceEl.style.display = 'none';
    hiddenEl.style.display = 'block';
    eyeIcon.classList.remove('fa-eye-slash');
    eyeIcon.classList.add('fa-eye');
  }
}

    // Initialize Dashboard
    loadDashboard();

    // Live Clock
    setInterval(() => {
      const now = new Date();
      const dateTimeEl = document.getElementById("date-time");
      if (dateTimeEl) dateTimeEl.textContent = now.toLocaleString();
    }, 1000);

    // Logout Fix
    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    // Simple Inactivity Auto-Logout (5 Minutes)
    let timeout;
    function resetTimer() {
      clearTimeout(timeout);
      timeout = setTimeout(() => {
        alert("Security Timeout: You have been logged out.");
        logout();
      }, 300000);
    }
    document.onmousemove = resetTimer;
    document.onkeypress = resetTimer;
  </script>
</body>
